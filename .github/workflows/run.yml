name: 🔥 ULTRA Downloader LOG FIX

on:
  push:
    paths:
      - 'requests.json'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Install deps
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install ffmpeg -y

      # 🔥 FORCE LOGS ENABLE
      - name: 🚀 Run Downloader (FULL LOGS)
        run: |
          echo "========== START =========="
          python -u downloader.py
          echo "========== END =========="

      # 🔥 SHOW FILES
      - name: 📂 Check downloads
        run: |
          echo "FILES:"
          ls -lah downloads || echo "No files found"

      # 🔥 SHOW JSON
      - name: 📊 Show status.json
        run: |
          echo "STATUS:"
          cat status.json || echo "No status"

      # 🔥 SAFE COMMIT
      - name: 💾 Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"

          git add . || true

          git commit -m "log update" || echo "no change"

          git pull --rebase || true
          git push || true
